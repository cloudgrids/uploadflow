  <g transform="translate(70 270)"><text fill="#34d399" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" letter-spacing="5">ONE PAUSE. TOTAL CONTROL.</text><text y="120" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="100" font-weight="900" font-style="italic" letter-spacing="-5"><tspan x="0">INTERCEPT.</tspan><tspan x="0" dy="105">REVIEW.</tspan><tspan x="0" dy="105" fill="#eefb7a">RETURN.</tspan></text></g>
