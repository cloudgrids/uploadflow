    <g transform="translate(0 260)"><rect width="940" height="230" rx="26" fill="#fff" fill-opacity=".035" stroke="#fff" stroke-opacity=".12"/><circle cx="92" cy="92" r="42" fill="#fff"/><text x="92" y="102" text-anchor="middle" fill="#101416" font-family="monospace" font-size="24" font-weight="900">02</text><text x="170" y="83" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="900" font-style="italic">REVIEW</text><text x="170" y="125" fill="#fff" fill-opacity=".4" font-family="Arial,Helvetica,sans-serif" font-size="20">Optimize, redact, watermark, or upscale privately.</text><text x="170" y="166" fill="#eefb7a" font-family="monospace" font-size="14">YOUR FILES STAY LOCAL</text></g>
    <g transform="translate(0 520)"><rect width="940" height="230" rx="26" fill="#eefb7a"/><circle cx="92" cy="92" r="42" fill="#101416"/><text x="92" y="102" text-anchor="middle" fill="#eefb7a" font-family="monospace" font-size="24" font-weight="900">03</text><text x="170" y="83" fill="#101416" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="900" font-style="italic">RETURN</text><text x="170" y="125" fill="#101416" fill-opacity=".6" font-family="Arial,Helvetica,sans-serif" font-size="20">Continue the original upload with the finished file.</text><text x="170" y="166" fill="#101416" font-family="monospace" font-size="14">YOU APPROVE THE HANDOFF</text></g>
