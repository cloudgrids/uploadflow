    <path d="M27 36V16m0 0-9 9m9-9 9 9M14 34v4a7 7 0 0 0 7 7h12a7 7 0 0 0 7-7v-4" fill="none" stroke="#0b0d0f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
