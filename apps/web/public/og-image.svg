    <circle cx="25" cy="27" r="5" fill="#ff6b5e"/><circle cx="43" cy="27" r="5" fill="#f4c95d"/><circle cx="61" cy="27" r="5" fill="#58c477"/>
    <text x="285" y="31" fill="#ffffff" fill-opacity=".35" font-family="monospace" font-size="9">PRIVATE WORKSPACE</text>
