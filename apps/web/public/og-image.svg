    <radialGradient id="glow" cx="75%" cy="25%" r="55%">
      <stop offset="0" stop-color="#eefb7a" stop-opacity=".17"/>
      <stop offset="1" stop-color="#eefb7a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#0b0d0f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(72 60)">
